# -----------------------------------------------------------------------
# Resume data. Edit this file to update the CV — no need to touch the
# Typst template (resume.typ) at all for ordinary content changes.
#
# Fields are plain text/data with no Typst markup, EXCEPT the paragraphs
# inside work[].entries, which may use inline markup such as
# #link("https://example.com")[label] for links mentioned in prose.
#
# Long text fields use YAML folded block scalars (">-") wrapped at ~80
# columns for easy editing; the folding turns line breaks back into single
# spaces when parsed, so wrapping doesn't affect the rendered output.
#
# Dates in work[] are a list: [start, end] renders "<start> - <end>",
# [start] renders just "<start>" (a single point in time), and a missing
# `date` key renders no date at all.
# -----------------------------------------------------------------------

