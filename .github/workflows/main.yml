name: Build resume
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Install typst
        run: bin/setup
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Compile resume
        run: bin/build
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ufuk-Kayserilioglu-Resume.pdf
          path: Ufuk-Kayserilioglu-Resume.pdf
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"
      - name: Upload PDF to AWS S3
        run: aws s3 cp Ufuk-Kayserilioglu-Resume.pdf "s3://ufuk-kayserilioglu-resume/${{ github.ref_name }}/Ufuk-Kayserilioglu-Resume.pdf"
